<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mots cachés</title>

  <link rel="manifest" href="manifest.webmanifest" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      padding: 12px 16px;
      text-align: center;
    }
    #game {
      width: 100%;
      max-width: 480px;
      padding: 8px 16px 24px;
      box-sizing: border-box;
    }
    #grid {
      display: grid;
      gap: 3px;
      margin: 12px auto;
      touch-action: none;
    }
    .cell {
      width: 30px;
      height: 30px;
      background: #fff;
      border-radius: 4px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      user-select: none;
    }
    .cell.selected {
      background: #cde4ff;
      border-color: #4a90e2;
    }
    .cell.found {
      background: #b5f5b5;
      border-color: #3c9c3c;
      color: #104010;
    }
    #word-list {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 14px;
    }
    .word-item {
      padding: 3px 6px;
      border-radius: 4px;
      background: #fff;
      border: 1px solid #ccc;
    }
    .word-item.found {
      text-decoration: line-through;
      background: #b5f5b5;
      border-color: #3c9c3c;
    }
    #hidden-word {
      margin-top: 12px;
      font-weight: 700;
      text-align: center;
      min-height: 1.4em;
    }
    #controls {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    button {
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid #4a90e2;
      background: #4a90e2;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <header>
    <h1>Mots cachés</h1>
  </header>

  <main id="game">
    <div id="grid"></div>
    <div id="word-list"></div>
    <div id="hidden-word"></div>
    <div id="controls">
      <button id="new-game">Nouvelle grille</button>
    </div>
  </main>

  <script>
    // --- Données de base ---
    const GRID_SIZE = 10;

    const WORDS_VISIBLE = {
      animaux: ["CHAT", "LION", "TIGRE", "OURS", "RENARD"],
      fruits: ["POMME", "BANANE", "KIWI", "RAISIN"],
    };

    const WORDS_HIDDEN = {
      10: ["INFORMATIF", "NAVIGATEUR"],
      12: ["PROGRAMMATION", "ALGORITHMES"],
      14: ["DEVELOPPEMENT", "APPLICATIONS"],
      16: ["INTELLIGENCEART", "INTERFACEUTIL"],
      18: ["OPTIMISATIONCODE", "LOGISTIQUEJEU"],
    };

    const DIRECTIONS = [
      { dr: 0, dc: 1 },
      { dr: 0, dc: -1 },
      { dr: 1, dc: 0 },
      { dr: -1, dc: 0 },
      { dr: 1, dc: 1 },
      { dr: 1, dc: -1 },
      { dr: -1, dc: 1 },
      { dr: -1, dc: -1 },
    ];

    // --- Utilitaires ---
    function randInt(max) {
      return Math.floor(Math.random() * max);
    }

    function choice(arr) {
      return arr[randInt(arr.length)];
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = randInt(i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // --- Génération de grille ---
    function createEmptyGrid(size) {
      return Array.from({ length: size }, () =>
        Array.from({ length: size }, () => null)
      );
    }

    function createUsedGrid(size) {
      return Array.from({ length: size }, () =>
        Array.from({ length: size }, () => false)
      );
    }

    function canPlaceWord(grid, word, row, col, dir) {
      const n = grid.length;
      for (let i = 0; i < word.length; i++) {
        const r = row + dir.dr * i;
        const c = col + dir.dc * i;
        if (r < 0 || r >= n || c < 0 || c >= n) return false;
        const ch = grid[r][c];
        if (ch !== null && ch !== word[i]) return false;
      }
      return true;
    }

    function placeWord(grid, used, word) {
      const n = grid.length;
      const dirs = shuffle([...DIRECTIONS]);
      for (let attempt = 0; attempt < 200; attempt++) {
        const dir = dirs[attempt % dirs.length];
        const row = randInt(n);
        const col = randInt(n);
        if (!canPlaceWord(grid, word, row, col, dir)) continue;
        for (let i = 0; i < word.length; i++) {
          const r = row + dir.dr * i;
          const c = col + dir.dc * i;
          grid[r][c] = word[i];
          used[r][c] = true;
        }
        return true;
      }
      return false;
    }

    // Retourne les cellules libres triées en ordre de lecture (ligne par ligne)
    function getUnusedCells(used) {
      const cells = [];
      const n = used.length;
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          if (!used[r][c]) cells.push([r, c]);
        }
      }
      // Déjà dans l'ordre lecture grâce aux boucles imbriquées r puis c
      return cells;
    }

    // Cherche la clé de WORDS_HIDDEN la plus proche du nombre de cellules libres
    function selectHiddenWord(freeCount) {
      const keys = Object.keys(WORDS_HIDDEN).map(Number).sort((a, b) => a - b);
      // On cherche la clé <= freeCount la plus grande
      let best = null;
      for (const k of keys) {
        if (k <= freeCount) best = k;
      }
      if (best === null) return null;
      const list = WORDS_HIDDEN[best];
      if (!list || list.length === 0) return null;
      return { word: choice(list), length: best };
    }

    function fillHiddenWord(grid, used) {
      const unused = getUnusedCells(used);
      const freeCount = unused.length;
      const result = selectHiddenWord(freeCount);
      if (!result) return null;
      const { word } = result;
      for (let i = 0; i < word.length; i++) {
        const [r, c] = unused[i];
        grid[r][c] = word[i];
      }
      return word;
    }

    // --- Génération complète d'une grille ---
    function generateGame(depth = 0) {
      if (depth > 50) {
        console.error("Trop de tentatives de génération");
        return null;
      }
      const grid = createEmptyGrid(GRID_SIZE);
      const used = createUsedGrid(GRID_SIZE);

      const themes = Object.keys(WORDS_VISIBLE);
      const theme = choice(themes);
      const words = [...WORDS_VISIBLE[theme]];

      for (const w of words) {
        const ok = placeWord(grid, used, w);
        if (!ok) return generateGame(depth + 1);
      }

      const hidden = fillHiddenWord(grid, used);
      if (!hidden) return generateGame(depth + 1);

      // Remplir les cellules restantes avec des lettres aléatoires
      const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const n = grid.length;
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          if (grid[r][c] === null) {
            grid[r][c] = alpha[randInt(alpha.length)];
          }
        }
      }

      return { grid, words, hiddenWord: hidden };
    }

    // --- UI ---
    const gridEl = document.getElementById("grid");
    const wordListEl = document.getElementById("word-list");
    const hiddenWordEl = document.getElementById("hidden-word");
    const newGameBtn = document.getElementById("new-game");

    let currentGame = null;
    let selectedCells = [];
    let isDragging = false;

    function renderGrid(grid) {
      const n = grid.length;
      gridEl.innerHTML = "";
      gridEl.style.gridTemplateColumns = `repeat(${n}, 30px)`;
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          const div = document.createElement("div");
          div.className = "cell";
          div.textContent = grid[r][c] || "";
          div.dataset.row = r;
          div.dataset.col = c;
          gridEl.appendChild(div);
        }
      }
    }

    function renderWordList(words) {
      wordListEl.innerHTML = "";
      words.forEach((w) => {
        const span = document.createElement("span");
        span.className = "word-item";
        span.textContent = w;
        span.dataset.word = w;
        wordListEl.appendChild(span);
      });
    }

    function clearSelection() {
      selectedCells.forEach((cell) => cell.classList.remove("selected"));
      selectedCells = [];
    }

    function getCellFromEvent(e) {
      const target = e.target.closest(".cell");
      if (!target) return null;
      return target;
    }

    function getWordFromSelection() {
      if (!selectedCells.length) return "";
      return selectedCells.map((c) => c.textContent).join("");
    }

    function markWordFound(word) {
      const items = wordListEl.querySelectorAll(".word-item");
      items.forEach((el) => {
        if (el.dataset.word === word) el.classList.add("found");
      });
    }

    function allWordsFound() {
      const items = wordListEl.querySelectorAll(".word-item");
      return Array.from(items).every((el) => el.classList.contains("found"));
    }

    function revealHiddenWord() {
      hiddenWordEl.textContent = "Mot caché : " + currentGame.hiddenWord;
    }

    function setupGridEvents() {
      gridEl.addEventListener("pointerdown", (e) => {
        const cell = getCellFromEvent(e);
        if (!cell) return;
        isDragging = true;
        clearSelection();
        cell.classList.add("selected");
        selectedCells.push(cell);
      });

      gridEl.addEventListener("pointermove", (e) => {
        if (!isDragging) return;
        const cell = getCellFromEvent(e);
        if (!cell) return;
        if (!selectedCells.includes(cell)) {
          cell.classList.add("selected");
          selectedCells.push(cell);
        }
      });

      window.addEventListener("pointerup", () => {
        if (!isDragging) return;
        isDragging = false;
        const word = getWordFromSelection();
        if (currentGame.words.includes(word)) {
          selectedCells.forEach((c) => c.classList.add("found"));
          markWordFound(word);
          if (allWordsFound()) revealHiddenWord();
        }
        clearSelection();
      });
    }

    function newGame() {
      hiddenWordEl.textContent = "";
      currentGame = generateGame();
      if (!currentGame) return;
      renderGrid(currentGame.grid);
      renderWordList(currentGame.words);
    }

    newGameBtn.addEventListener("click", newGame);
    setupGridEvents();
    newGame();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
