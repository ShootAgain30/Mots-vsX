<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mots cachés</title>
  <link rel="manifest" href="manifest.webmanifest"/>
  <style>
    *{box-sizing:border-box;}
    body{font-family:system-ui,sans-serif;margin:0;padding:0;background:#b0b0b0;
         display:flex;flex-direction:column;align-items:center;justify-content:center;
         min-height:100dvh;gap:24px;}
    h1{margin:0;font-size:2rem;text-align:center;}
    .subtitle{font-size:13px;color:#444;margin-top:-16px;}
    .section{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:300px;padding:0 16px;}
    .section-title{font-size:12px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
    .grid-btns{display:flex;gap:8px;justify-content:center;}
    .grid-btn{padding:8px 18px;border-radius:8px;border:2px solid #888;background:#fff;
              font-size:14px;font-weight:700;cursor:pointer;color:#444;}
    .grid-btn.active{background:#4a90e2;border-color:#4a90e2;color:#fff;}
    .btn-solo{width:100%;padding:14px;border-radius:10px;border:none;background:#4a90e2;
              color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;
              box-shadow:0 3px 8px rgba(0,0,0,.2);text-decoration:none;text-align:center;display:block;}
    .btn-solo:active{transform:scale(.97);}
    .btn-multi{width:100%;padding:14px;border-radius:10px;border:none;background:#9b59b6;
               color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;
               box-shadow:0 3px 8px rgba(0,0,0,.2);text-decoration:none;text-align:center;display:block;}
    .btn-multi:active{transform:scale(.97);}
    #signature{position:fixed;bottom:8px;left:8px;font-size:13px;color:#333;font-style:italic;opacity:.7;}
    #version{position:fixed;bottom:8px;right:8px;font-size:13px;color:#333;opacity:.7;}
  </style>
</head>
<body>

  <h1>🔍 Mots cachés</h1>
  <div class="subtitle">par Syst'MD</div>

  <div class="section">
    <div class="section-title">Taille de la grille</div>
    <div class="grid-btns">
      <button class="grid-btn" data-size="12">12×12</button>
      <button class="grid-btn" data-size="16">16×16</button>
      <button class="grid-btn" data-size="18">18×18</button>
    </div>
  </div>

  <div class="section">
    <a class="btn-solo" href="solo.html" onclick="localStorage.setItem('mots-grid-size', selectedSize);">🎮 Solo</a>
    <a class="btn-multi" href="multi.html" onclick="localStorage.setItem('mots-grid-size', selectedSize);">👥 Multijoueur</a>
  </div>

  <div id="signature">Syst'MD</div>
  <div id="version"></div>

<script>
  var GRID_KEY = "mots-grid-size";
  var selectedSize = parseInt(localStorage.getItem(GRID_KEY)) || 12;

  var btns = document.querySelectorAll(".grid-btn");
  btns.forEach(function(btn) {
    if (parseInt(btn.dataset.size) === selectedSize) btn.classList.add("active");
    btn.addEventListener("click", function() {
      btns.forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      selectedSize = parseInt(btn.dataset.size);
      localStorage.setItem(GRID_KEY, selectedSize);
    });
  });

  function startGame(mode) {
    localStorage.setItem(GRID_KEY, selectedSize);
    window.location.href = mode === "solo" ? "solo.html" : "multi.html";
  }
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
  if (window.caches) {
    caches.keys().then(function(keys) {
      var k = keys.find(function(k){ return k.indexOf('mots-cache') === 0; });
      if (k) {
        var v = k.replace('mots-cache-multi-x-','').replace('mots-cache-','');
        document.getElementById('version').textContent = v;
      }
    });
  }
</script>
</body>
</html>
