<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mots cach&#233;s</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    *{box-sizing:border-box;}
    body{font-family:system-ui,sans-serif;margin:0;padding:0;background:#b0b0b0;color:#222;display:flex;flex-direction:column;align-items:center;}
    header{padding:10px 16px;text-align:center;}
    h1{margin:0;font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:100%;position:relative;}
    #theme-label{font-size:12px;color:#000;margin-top:2px;}
    #game{width:100%;max-width:720px;padding:4px 4px 24px;margin:0 auto;}
    #grid-wrap{margin:6px auto;}
    #grid-canvas{display:block;touch-action:none;}
    #score{text-align:center;font-size:13px;color:#555;margin:4px 0;}
    #word-list{display:flex;flex-wrap:wrap;gap:5px;font-size:12px;margin-top:6px;}
    .word-item{padding:3px 7px;border-radius:4px;background:#fff;border:1px solid #ccc;font-weight:600;letter-spacing:.5px;}
    .word-item.found{text-decoration:line-through;background:#b5f5b5;border-color:#3c9c3c;color:#104010;}
    #mystery-zone{display:none;margin-top:14px;flex-direction:column;align-items:center;gap:8px;}
    #mystery-zone.visible{display:flex;}
    #mystery-hint{font-size:12px;color:#888;font-style:italic;text-align:center;}
    #mystery-row{display:flex;gap:6px;align-items:center;}
    #mystery-input{padding:7px 10px;border:2px solid #4a90e2;border-radius:6px;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;width:180px;outline:none;text-align:center;}
    #mystery-input.error{border-color:#e24a4a;background:#fff0f0;animation:shake .3s ease;}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    #mystery-btn{padding:7px 14px;border-radius:6px;border:none;background:#4a90e2;color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
    #mystery-btn:active{transform:scale(.97);}
    #mystery-result{font-size:1rem;font-weight:700;text-align:center;min-height:1.4em;}
    #mystery-result.win{color:#1a7a1a;}
    #mystery-result.fail{color:#c00;}
    #controls{margin-top:12px;display:flex;justify-content:center;gap:10px;}
    #btn-new{padding:8px 22px;border-radius:6px;border:none;background:#4a90e2;color:#fff;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.2);}
    #btn-new:active{transform:scale(.97);}
    #btn-save{padding:8px 14px;border-radius:6px;border:none;background:#27ae60;color:#fff;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.2);}
    #btn-save:active{transform:scale(.97);}
    #resume-banner{display:none;margin:8px 10px;padding:10px 14px;background:#fffbe6;border:1px solid #f0c040;border-radius:8px;font-size:13px;text-align:center;}
    #resume-banner.visible{display:block;}
    #confirm-banner{display:none;margin:8px 10px;padding:10px 14px;background:#fff0f0;border:1px solid #e74c3c;border-radius:8px;font-size:13px;text-align:center;}
    #confirm-banner.visible{display:block;}
    #version{position:fixed;bottom:6px;right:8px;font-size:14px;color:#000;opacity:.7;pointer-events:none;}
    #signature{position:fixed;bottom:6px;left:8px;font-size:14px;color:#000;opacity:.7;pointer-events:none;font-style:italic;}
    /* MULTIJOUEUR */
    #multi-btn{padding:8px 14px;border-radius:6px;border:none;background:#9b59b6;color:#fff;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.2);}
    #multi-panel{display:none;margin:10px;padding:12px;background:#f0e6ff;border:1px solid #9b59b6;border-radius:10px;font-size:13px;}
    #multi-panel.visible{display:block;}
    #multi-status{margin-top:8px;font-size:1rem;font-weight:600;color:#333;text-align:center;min-height:1.4em;}
    #adv-score{margin-top:6px;padding:8px 10px;background:#fff;border-radius:6px;font-size:1rem;font-weight:700;text-align:center;display:none;}
    #adv-score.visible{display:block;}
    #adv-bar-wrap{height:10px;background:#ddd;border-radius:5px;margin-top:6px;overflow:hidden;}
    #adv-bar{height:10px;background:#e74c3c;border-radius:5px;width:0%;transition:width .3s;}
    #multi-result{display:none;padding:14px;border-radius:10px;margin-top:8px;text-align:center;font-size:1.4rem;font-weight:700;}
    #multi-result.visible{display:block;}
    #multi-result.win{background:#d4f5d4;border:2px solid #27ae60;color:#145214;}
    #multi-result.lose{background:#ffd4d4;border:2px solid #e74c3c;color:#7a0000;}
  </style>
</head>
<body>
  <!-- MENU TAILLE GRILLE -->
  <div id="grid-menu" style="display:none;position:fixed;top:54px;right:8px;background:#fff;border:1px solid #aaa;border-radius:8px;box-shadow:0 3px 8px rgba(0,0,0,.2);z-index:999;padding:6px;">
    <div style="font-size:11px;color:#888;text-align:center;margin-bottom:4px;">Taille grille</div>
    <div style="display:flex;flex-direction:column;gap:4px;">
      <button class="gsize-btn" data-size="6" style="padding:6px 16px;border-radius:5px;border:1px solid #aaa;background:#fff;font-size:13px;font-weight:700;cursor:pointer;">6×6</button>
      <button class="gsize-btn" data-size="8" style="padding:6px 16px;border-radius:5px;border:1px solid #aaa;background:#fff;font-size:13px;font-weight:700;cursor:pointer;">8×8</button>
      <button class="gsize-btn" data-size="10" style="padding:6px 16px;border-radius:5px;border:1px solid #aaa;background:#fff;font-size:13px;font-weight:700;cursor:pointer;">10×10</button>
      <button class="gsize-btn" data-size="12" style="padding:6px 16px;border-radius:5px;border:1px solid #aaa;background:#fff;font-size:13px;font-weight:700;cursor:pointer;">12×12</button>
      <button class="gsize-btn" data-size="14" style="padding:6px 16px;border-radius:5px;border:1px solid #aaa;background:#fff;font-size:13px;font-weight:700;cursor:pointer;">14×14</button>
      <button class="gsize-btn" data-size="16" style="padding:6px 16px;border-radius:5px;border:1px solid #aaa;background:#fff;font-size:13px;font-weight:700;cursor:pointer;">16×16</button>
    </div>
  </div>
  <header>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
      <h1><span id="cheat-btn">&#128269;</span> Mots cach&#233;s <span id="sound-btn" style="cursor:pointer;font-size:2rem;margin-left:8px;">&#128266;</span> <span id="grid-btn" style="cursor:pointer;font-size:2rem;position:absolute;right:8px;filter:sepia(1) saturate(5) hue-rotate(-30deg);" title="Taille grille">⚙️</span></h1>
    </div>
    <div id="theme-label"></div>
  </header>
  <main id="game">
    <div id="grid-wrap"><canvas id="grid-canvas"></canvas></div>
    <div id="score"></div>
    <div id="word-list"></div>
    <div id="mystery-zone">
      <div id="mystery-hint"></div>
      <div id="mystery-row">
        <input id="mystery-input" type="text" maxlength="25" placeholder="MOT MYSTERE"
               autocomplete="off" autocorrect="off" spellcheck="false" />
        <button id="mystery-btn">OK</button>
      </div>
      <div id="mystery-result"></div>
    </div>
    <div id="resume-banner">
      📂 Partie sauvegardée trouvée — <strong id="resume-info"></strong><br>
      <div style="margin-top:8px;display:flex;gap:8px;justify-content:center;">
        <button id="btn-resume" style="padding:6px 14px;border-radius:5px;border:none;background:#27ae60;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">Reprendre</button>
        <button id="btn-discard" style="padding:6px 14px;border-radius:5px;border:none;background:#e74c3c;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">Ignorer</button>
      </div>
    </div>
    <div id="confirm-banner">
      ⚠️ <strong id="confirm-msg"></strong><br>
      <div style="margin-top:8px;display:flex;gap:8px;justify-content:center;">
        <button id="btn-confirm-yes" style="padding:6px 14px;border-radius:5px;border:none;background:#e74c3c;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">Écraser</button>
        <button id="btn-confirm-no" style="padding:6px 14px;border-radius:5px;border:none;background:#777;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">Annuler</button>
      </div>
    </div>
    <div id="controls">
      <button id="btn-new">Nouvelle grille</button>
      <button id="btn-save">💾 Sauvegarder</button>
      <button id="multi-btn">👥 Multi</button>
    </div>

    <!-- PANEL MULTIJOUEUR -->
    <div id="multi-panel">
      <div style="display:flex;gap:6px;justify-content:center;margin-bottom:8px;">
        <button id="btn-mode-compet" style="padding:6px 12px;border-radius:5px;border:2px solid #e74c3c;background:#fff;color:#e74c3c;font-size:12px;font-weight:700;cursor:pointer;">⚔️ Compétitif</button>
        <button id="btn-mode-coop" style="padding:6px 12px;border-radius:5px;border:2px solid #27ae60;background:#fff;color:#27ae60;font-size:12px;font-weight:700;cursor:pointer;">🤝 Coopératif</button>
      </div>
      <div id="multi-mode-zone" style="display:none;">
        <div style="display:flex;gap:6px;justify-content:center;margin-bottom:8px;">
          <button id="btn-host" style="padding:6px 14px;border-radius:5px;border:none;background:#9b59b6;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">Créer</button>
          <button id="btn-join" style="padding:6px 14px;border-radius:5px;border:none;background:#777;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">Rejoindre</button>
          <button id="btn-cancel-multi" style="padding:6px 14px;border-radius:5px;border:none;background:#aaa;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">Annuler</button>
        </div>
        <div id="join-zone" style="display:none;text-align:center;">
          <input id="room-input" type="text" placeholder="Code room" maxlength="6"
            style="width:110px;padding:5px 8px;border:1px solid #aaa;border-radius:5px;font-size:14px;text-align:center;letter-spacing:3px;text-transform:uppercase;"
            autocomplete="off"/>
          <button id="btn-connect" style="padding:5px 12px;border-radius:5px;border:none;background:#9b59b6;color:#fff;font-size:13px;cursor:pointer;margin-left:4px;">OK</button>
        </div>
        <div id="room-display" style="display:none;text-align:center;font-size:13px;">
          Code : <strong id="room-code" style="letter-spacing:3px;font-size:1.1rem;color:#9b59b6;"></strong>
          <div style="font-size:11px;color:#888;margin-top:2px;">Partage ce code à ton adversaire</div>
        </div>
        <button id="btn-quit-multi" style="display:none;padding:5px 12px;border-radius:5px;border:none;background:#e74c3c;color:#fff;font-size:12px;cursor:pointer;margin-top:6px;">Quitter</button>
      </div>
      <div id="multi-status"></div>
      <div id="adv-score">
        <span id="adv-label">Adversaire</span> : <span id="adv-count">0</span> / <span id="adv-total">0</span>
        <div id="adv-bar-wrap"><div id="adv-bar"></div></div>
      </div>
      <div id="multi-result"></div>
      <!-- MESSAGE VOCAL -->
      <div id="voice-zone" style="display:none;margin-top:8px;text-align:center;">
        <button id="btn-mic" style="padding:8px 16px;border-radius:20px;border:none;background:#e67e22;color:#fff;font-size:1.2rem;cursor:pointer;">🎙️ Maintenir pour parler</button>
        <div id="voice-status" style="font-size:11px;color:#888;margin-top:4px;"></div>
        <audio id="audio-playback" style="display:none;margin-top:6px;" controls></audio>
        <div style="margin-top:8px;display:flex;gap:8px;justify-content:center;align-items:center;">
          <button id="btn-call" style="padding:8px 16px;border-radius:20px;border:none;background:#27ae60;color:#fff;font-size:1.2rem;cursor:pointer;">📞 Appeler</button>
          <button id="btn-hangup" style="display:none;padding:8px 16px;border-radius:20px;border:none;background:#e74c3c;color:#fff;font-size:1.2rem;cursor:pointer;">📵 Raccrocher</button>
        </div>
        <div id="call-status" style="font-size:12px;font-weight:600;color:#333;margin-top:4px;"></div>
        <audio id="remote-audio" autoplay style="display:none;"></audio>
      </div>
    </div>
    <div id="seed-zone" style="margin-top:10px;display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div id="seed-display" style="font-size:12px;color:#333;"></div>
      <div style="display:flex;gap:6px;align-items:center;">
        <input id="seed-input" type="text" placeholder="Code partie"
               style="width:130px;padding:5px 8px;border:1px solid #aaa;border-radius:5px;font-size:13px;text-align:center;"
               autocomplete="off" />
        <button id="btn-seed" style="padding:5px 12px;border-radius:5px;border:none;background:#777;color:#fff;font-size:13px;cursor:pointer;">Rejouer</button>
      </div>
    </div>
  </main>
  <div id="version"></div>
  <div id="signature">Syst'MD</div>

// ── GÉNÉRATEUR PSEUDO-ALÉATOIRE SEEDÉ (Mulberry32) ───────────────────
var currentSeed = 0;
var _rng = Math.random; // fallback

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function initSeed(seed) {
  currentSeed = seed;
  _rng = mulberry32(seed);
}

function randInt(n) { return Math.floor(_rng() * n); }

  a = a.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = randInt(i + 1), t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function cellKey(r, c) { return r * 100 + c; }

function makeGrid() {
  var g = [];
  for (var r = 0; r < GRID_SIZE; r++) {
    g[r] = [];
    for (var c = 0; c < GRID_SIZE; c++) g[r][c] = null;
  }
  return g;
}
function makeUsed() {
  var u = [];
  for (var r = 0; r < GRID_SIZE; r++) {
    u[r] = [];
    for (var c = 0; c < GRID_SIZE; c++) u[r][c] = false;
  }
  return u;
}
function filterSubwords(words) {
  return words.filter(function(w) {
    return !words.some(function(o) { return o !== w && o.indexOf(w) !== -1; });
  });
}
function canPlace(g, w, r0, c0, d) {
  for (var i = 0; i < w.length; i++) {
    var r = r0 + d.dr * i, c = c0 + d.dc * i;
    if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return false;
    if (g[r][c] !== null && g[r][c] !== w[i]) return false;
  }
  return true;
}
function doPlace(g, w, r0, c0, d) {
  for (var i = 0; i < w.length; i++) g[r0 + d.dr*i][c0 + d.dc*i] = w[i];
}

  for (var i = 0; i < w.length; i++)

}

  if (!centers.length) return { r: GRID_SIZE/2, c: GRID_SIZE/2 };
  var sr = 0, sc = 0;
  for (var i = 0; i < centers.length; i++) { sr += centers[i].r; sc += centers[i].c; }
  return { r: sr/centers.length, c: sc/centers.length };
}
// Trouve la meilleure position sans écrire dans la grille
// Retourne {cells, r0, c0, dir} ou null
function findPlace(grid, word, wordCenters) {
  var pref = pickDirIdx(), order = [pref];
  for (var i = 0; i < 8; i++) if (i !== pref) order.push(i);
  var bestCells = null, bestScore = -Infinity, bestR = 0, bestC = 0, bestDir = null;
  var com = centerOfMass(wordCenters || []);
  for (var oi = 0; oi < order.length; oi++) {
    var dir = ALL_DIRS[order[oi]], valid = [];
    for (var r = 0; r < GRID_SIZE; r++)
      for (var c = 0; c < GRID_SIZE; c++)
        if (canPlace(grid, word, r, c, dir)) valid.push([r, c]);
    if (!valid.length) continue;
    valid = shuffle(valid); // tester toutes les positions, pas seulement un échantillon
    var foundInter = false;
    for (var vi = 0; vi < valid.length; vi++) {
      var r0 = valid[vi][0], c0 = valid[vi][1];
      var inter = countIntersections(grid, word, r0, c0, dir);
      // Centre du mot candidat
      var midR = r0 + dir.dr * (word.length-1) / 2;
      var midC = c0 + dir.dc * (word.length-1) / 2;
      // Distance au centre de gravité — favorise la dispersion
      var dist = Math.sqrt((midR-com.r)*(midR-com.r) + (midC-com.c)*(midC-com.c));
      // Score : intersections comptent triple, dispersion compte simple
      var score = (wordCenters && wordCenters.length > 0) ? inter * 3 + dist * 0.5 : 0;
      if (score > bestScore) {
        bestScore = score; bestR = r0; bestC = c0; bestDir = dir;
        bestCells = [];
        for (var i = 0; i < word.length; i++) bestCells.push([r0+dir.dr*i, c0+dir.dc*i]);
        if (inter > 0) foundInter = true;
      }
    }
    if (foundInter) break;
  }

  return { cells: bestCells, r0: bestR, c0: bestC, dir: bestDir };

function countFree(g) {
  var n = 0;
  for (var r = 0; r < GRID_SIZE; r++)

}
function freeCells(g) {
  var a = [];
  for (var r = 0; r < GRID_SIZE; r++)
    for (var c = 0; c < GRID_SIZE; c++)

}
function generateGame() {
  var names = Object.keys(THEMES);
  for (var att = 0; att < (GRID_SIZE <= 8 ? 2000 : GRID_SIZE <= 12 ? 500 : GRID_SIZE <= 14 ? 400 : 300); att++) {
    var grid = makeGrid(), theme = choice(names);
    var raw = THEMES[theme].filter(function(w) { return w.length >= 3 && w.length <= GRID_SIZE; });
    raw = filterSubwords(raw);

    // Trier : mélange équilibré court/moyen/long comme les vrais jeux
    // On intercale : 1 long (9-12), 2 moyens (5-8), 1 court (3-4)
    var courts = shuffle(raw.filter(function(w){ return w.length <= 4; }));
    var moyens = shuffle(raw.filter(function(w){ return w.length >= 5 && w.length <= 8; }));
    var longs  = shuffle(raw.filter(function(w){ return w.length >= 9; }));
    var pool = [];
    var li=0,mi=0,ci=0;
    while(li<longs.length||mi<moyens.length||ci<courts.length){
      if(li<longs.length)  pool.push(longs[li++]);
      if(mi<moyens.length) pool.push(moyens[mi++]);
      if(mi<moyens.length) pool.push(moyens[mi++]);
      if(ci<courts.length) pool.push(courts[ci++]);
    }

    var placed = [], cov = {}, wordCenters = [];

    for (var pi = 0; pi < pool.length; pi++) {
      var word = pool[pi];
      var placement = findPlace(grid, word, wordCenters);
      if (!placement) continue;
      var cells = placement.cells;

      // Vérifier si le mot apporte au moins une case nouvelle (null dans la grille)
      var isNew = false;
      for (var ci2 = 0; ci2 < cells.length; ci2++)
        if (grid[cells[ci2][0]][cells[ci2][1]] === null) { isNew = true; break; }
      if (!isNew) continue;

      // Accepté : écrire maintenant
      doPlace(grid, word, placement.r0, placement.c0, placement.dir);
      for (var ci2 = 0; ci2 < cells.length; ci2++) {
        var k = cellKey(cells[ci2][0], cells[ci2][1]);
        cov[k] = (cov[k] || 0) + 1;
      }
      var midR = placement.r0 + placement.dir.dr * (word.length-1) / 2;
      var midC = placement.c0 + placement.dir.dc * (word.length-1) / 2;
      wordCenters.push({ r: midR, c: midC });
      placed.push(word);

    if (placed.length < 8) continue;

    var orphan = false;
    for (var r = 0; r < GRID_SIZE; r++)
      for (var c = 0; c < GRID_SIZE; c++)
        if (grid[r][c] !== null && !cov[cellKey(r,c)]) { orphan = true; break; }
    if (orphan) continue;

    // Rejeter si 3+ cases libres alignées horizontalement ou verticalement
    var hasRun = false;
    // Horizontales
    for (var r = 0; r < GRID_SIZE && !hasRun; r++) {
      var run = 0;
      for (var c = 0; c < GRID_SIZE; c++) {
        if (grid[r][c] === null) { run++; if (run >= 3) { hasRun = true; break; } }
        else run = 0;
      }
    }
    // Verticales
    for (var c = 0; c < GRID_SIZE && !hasRun; c++) {
      var run = 0;
      for (var r = 0; r < GRID_SIZE; r++) {
        if (grid[r][c] === null) { run++; if (run >= 3) { hasRun = true; break; } }
        else run = 0;
      }

    var free = countFree(grid);

    if (free < 3 || free > freeMax) continue;

    var cands = SECRETS_LIST.filter(function(s){ return s.length === free; });
    if (!cands.length) continue;
    var secret = choice(cands);
    var fc = freeCells(grid);
    for (var i=0;i<secret.length;i++) grid[fc[i][0]][fc[i][1]] = secret[i];
    return { grid:grid, words:placed, hiddenWord:secret, secretCells:fc.slice(0,secret.length), theme:theme };

    }
  }

  // 5. Lettres PAR-DESSUS tout
  for (var r = 0; r < GRID_SIZE; r++) {
    for (var c = 0; c < GRID_SIZE; c++) {
      ctx.fillStyle = (allFound && isInSecretCells(r,c)) ? "#ffffff" : "#222222";
      ctx.font = "bold " + FONT_SIZE + "px system-ui";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(game.grid[r][c], c*CELL + CELL/2, r*CELL + CELL/2);
    }
  }
}

// ── SÉLECTION ─────────────────────────────────────────────────────────
function pointToCell(cx, cy) {
  var rect = canvas.getBoundingClientRect();
  var x = (cx - rect.left) * (canvas.width / rect.width);
  var y = (cy - rect.top)  * (canvas.height / rect.height);
  var c = Math.floor(x / CELL), r = Math.floor(y / CELL);
  if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return null;
  return {r:r, c:c};
}
function buildLine(from, to) {
  var dr = to.r - from.r, dc = to.c - from.c;
  var adr = Math.abs(dr), adc = Math.abs(dc);
  if (adr !== 0 && adc !== 0 && adr !== adc) return null;
  var steps = Math.max(adr, adc);
  var sdr = dr > 0 ? 1 : dr < 0 ? -1 : 0;
  var sdc = dc > 0 ? 1 : dc < 0 ? -1 : 0;
  var line = [];
  for (var i = 0; i <= steps; i++) line.push({r: from.r + sdr*i, c: from.c + sdc*i});
  return line;
}
function onStart(cx, cy) {
  if (allFound) return;
  var cell = pointToCell(cx, cy);
  if (!cell) return;
  dragging = true; selCells = [cell]; drawGrid();
}
function onMove(cx, cy) {
  if (!dragging) return;
  var cell = pointToCell(cx, cy);
  if (!cell) return;
  var line = buildLine(selCells[0], cell);
  if (line) { selCells = line; drawGrid(); }
}
function onEnd() {
  if (!dragging) return;
  dragging = false;
  if (selCells.length >= 2) {
    var word = "", i;
    for (i = 0; i < selCells.length; i++) word += game.grid[selCells[i].r][selCells[i].c];
    var wordRev = word.split("").reverse().join("");
    var match = null;
    for (i = 0; i < game.words.length; i++) {
      if ((game.words[i] === word || game.words[i] === wordRev) && !foundWords[game.words[i]]) {
        match = game.words[i]; break;
      }
    }
    if (match) {
      foundWords[match] = true; foundCount++;
      for (i = 0; i < selCells.length; i++) usedCells[selCells[i].r][selCells[i].c] = true;
      // Surlignage coloré
      var hlColor = HL_COLORS[colorIdx++ % HL_COLORS.length];
      highlights.push({ cells: selCells.slice(), color: hlColor });
      markWordFound(match, hlColor);
      updateScore();
      playPlop();
      if (typeof multiNotify === "function") multiNotify(match);
      if (foundCount === game.words.length) onAllFound();
    }
  }
  selCells = []; drawGrid();
}
function onAllFound() {
  allFound = true; drawGrid();
  playWin();
  // En mode compétitif : signaler la fin à l'adversaire
  if (typeof multiActive !== "undefined" && multiActive && typeof multiMode !== "undefined") {
    if (multiMode === "compet" && typeof multiNotify === "function") {
      multiNotify(null); // envoie foundCount === total → l'adversaire voit 100%
    }
  }
  document.getElementById("mystery-hint").innerHTML =
    "Les lettres jaunes forment le mot myst&#232;re.<br>Lis les <b>" +
    game.hiddenWord.length + " premi&#232;res</b> dans l'ordre !";
  document.getElementById("mystery-zone").classList.add("visible");
  document.getElementById("mystery-input").focus();
}

function playPlop() {
  if (!soundOn) return;
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(520, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

function playWin() {
  if (!soundOn) return;
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var notes = [523, 659, 784, 1047];
    notes.forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i*0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.25);
      osc.start(ctx.currentTime + i*0.12);
      osc.stop(ctx.currentTime + i*0.12 + 0.25);
    });
  } catch(e) {}
}

function playMystery() {
  if (!soundOn) return;
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Mêmes notes qu'à la victoire mais à l'envers : Do Sol Mi Do
    var notes = [1047, 784, 659, 523];
    notes.forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.35, ctx.currentTime + i*0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.15 + 0.3);
      osc.start(ctx.currentTime + i*0.15);
      osc.stop(ctx.currentTime + i*0.15 + 0.3);
    });
  } catch(e) {}
}

document.getElementById("btn-seed").addEventListener("click", function(){
  var raw = document.getElementById("seed-input").value.trim().toUpperCase();
  if (!raw) return;
  var val = parseInt(raw);

  // CHEATS DIRECTION : HOR, VER, DIA
  if (raw === "HOR" || raw === "VER" || raw === "DIA") {
    if (!game) return;
    var dirFilter = raw === "HOR"
      ? function(d){ return d.dr===0; }
      : raw === "VER"
        ? function(d){ return d.dc===0; }
        : function(d){ return d.dr!==0 && d.dc!==0; };
    game.words.forEach(function(word) {
      outer6: for (var r=0;r<GRID_SIZE;r++) for (var c=0;c<GRID_SIZE;c++) {
        for (var di=0;di<ALL_DIRS.length;di++) {
          var dir=ALL_DIRS[di];
          if (!dirFilter(dir)) continue;
          var match=true;
          for (var k=0;k<word.length;k++) {
            var nr=r+dir.dr*k,nc=c+dir.dc*k;
            if(nr<0||nr>=GRID_SIZE||nc<0||nc>=GRID_SIZE||game.grid[nr][nc]!==word[k]){match=false;break;}
          }
          if (match) {
            if (!foundWords[word]) { foundWords[word]=true; foundCount++; markWordFound(word, HL_COLORS[colorIdx%HL_COLORS.length]); }
            var cheatCells=[], cheatColor=HL_COLORS[colorIdx++%HL_COLORS.length];
            for(var k=0;k<word.length;k++){usedCells[r+dir.dr*k][c+dir.dc*k]=true;cheatCells.push({r:r+dir.dr*k,c:c+dir.dc*k});}
            highlights.push({cells:cheatCells,color:cheatColor});
            if (typeof multiNotify==="function") multiNotify(word);
            break outer6;
          }
        }
      }
    });
    updateScore(); drawGrid();
    if (foundCount===game.words.length) onAllFound();
    document.getElementById("seed-input").value="";
    return;
  }

  // Cas 1 : c'est un mot (contient des lettres) → trouver ce mot dans la grille
  if (isNaN(val) || /[A-Z]/.test(raw) && raw.length <= 12) {
    if (!game) return;
    var word = raw.replace(/[^A-Z]/g, "");
    if (foundWords[word]) { document.getElementById("seed-input").value = ""; return; }
    var found = false;
    for (var r = 0; r < GRID_SIZE && !found; r++) {
      for (var c = 0; c < GRID_SIZE && !found; c++) {
        for (var di = 0; di < ALL_DIRS.length && !found; di++) {
          var dir = ALL_DIRS[di], match = true;
          for (var k = 0; k < word.length; k++) {
            var nr = r+dir.dr*k, nc = c+dir.dc*k;
            if (nr<0||nr>=GRID_SIZE||nc<0||nc>=GRID_SIZE||game.grid[nr][nc]!==word[k]){match=false;break;}
          }
          if (match) {
            if (game.words.indexOf(word) !== -1 && !foundWords[word]) {
              foundWords[word] = true; foundCount++;
              var cheatCells = [];
              for (var k = 0; k < word.length; k++) {
                usedCells[r+dir.dr*k][c+dir.dc*k] = true;
                cheatCells.push({r:r+dir.dr*k, c:c+dir.dc*k});
              }
              var cheatColor = HL_COLORS[colorIdx++ % HL_COLORS.length];
              highlights.push({cells:cheatCells, color:cheatColor});
              markWordFound(word, cheatColor);
              updateScore(); drawGrid();
              if (typeof multiNotify === "function") multiNotify(word);
              if (foundCount === game.words.length) onAllFound();
            }
            found = true;
          }
        }
      }
    }
    document.getElementById("seed-input").value = "";
    return;
  }

  // Cas 2 : petit nombre → cheat avance-mots
  if (val > 0 && game && val <= game.words.length) {
    var remaining = game.words.filter(function(w){ return !foundWords[w]; });
    var toFind = remaining.slice(0, val);
    for (var i = 0; i < toFind.length; i++) {
      var word = toFind[i];
      // Chercher le mot dans la grille et colorier ses cases
      var wordFound = false;
      // Chercher le mot — priorité aux positions avec case non utilisée
      var bestR=-1, bestC=-1, bestDir=null, bestHasNew=false;
      for (var r = 0; r < GRID_SIZE && !wordFound; r++) {
        for (var c = 0; c < GRID_SIZE; c++) {
          for (var di = 0; di < ALL_DIRS.length; di++) {
            var dir = ALL_DIRS[di], match = true;
            for (var k = 0; k < word.length; k++) {
              var nr = r+dir.dr*k, nc = c+dir.dc*k;
              if (nr<0||nr>=GRID_SIZE||nc<0||nc>=GRID_SIZE||game.grid[nr][nc]!==word[k]){match=false;break;}
            }
            if (match) {
              var hasNew = false;
              for (var k = 0; k < word.length; k++)
                if (!usedCells[r+dir.dr*k][c+dir.dc*k]) { hasNew = true; break; }
              if (hasNew || bestR === -1) {
                bestR = r; bestC = c; bestDir = dir; bestHasNew = hasNew;
                if (hasNew) { wordFound = true; break; }
              }
            }
          }
          if (wordFound) break;
        }
      }
      if (bestR !== -1) {
        foundWords[word] = true; foundCount++;
        var cheatCells2 = [], cheatColor2 = HL_COLORS[colorIdx++ % HL_COLORS.length];
        for (var k = 0; k < word.length; k++) {
          usedCells[bestR+bestDir.dr*k][bestC+bestDir.dc*k] = true;
          cheatCells2.push({r:bestR+bestDir.dr*k, c:bestC+bestDir.dc*k});
        }
        highlights.push({cells:cheatCells2, color:cheatColor2});
        markWordFound(word, cheatColor2);
      }
      if (typeof multiNotify === "function") multiNotify(word);
    }
    updateScore(); drawGrid();
    if (foundCount === game.words.length) onAllFound();
    document.getElementById("seed-input").value = "";
    return;
  }

  // Cas 3 : grand nombre → rejouer avec ce seed
  // Format : [taille][seed] ex: 12329098 → taille=12, seed=329098
  if (val > 0) {
    var rawStr = String(val);
    var detectedSize = null;
    var detectedSeed = null;
    // Tester si les 2 premiers chiffres forment une taille valide
    var sizes = [6,8,10,12,14,16];
    for (var si=0; si<sizes.length; si++) {
      var sz = sizes[si];
      var szStr = String(sz);
      if (rawStr.indexOf(szStr) === 0 && rawStr.length > szStr.length) {
        var seedPart = parseInt(rawStr.slice(szStr.length));
        if (seedPart >= 100000) { detectedSize = sz; detectedSeed = seedPart; break; }
      }
    }
    if (detectedSize && detectedSeed) {
      // Changer la taille de grille si nécessaire
      if (detectedSize !== GRID_SIZE) {
        GRID_SIZE = detectedSize;
        localStorage.setItem("mots-grid-size", GRID_SIZE);
        CELL = Math.floor((Math.min(window.innerWidth, 720) - 8) / GRID_SIZE);
        FONT_SIZE = GRID_SIZE <= 10 ? Math.round(CELL * 0.52) : GRID_SIZE <= 12 ? Math.round(CELL * 0.48) : Math.round(CELL * 0.65);
        canvas.width = CELL * GRID_SIZE; canvas.height = CELL * GRID_SIZE;
        // Mettre à jour le bouton actif dans le sélecteur
        document.querySelectorAll(".gsize-btn").forEach(function(b){
          b.style.background = parseInt(b.getAttribute("data-size"))===GRID_SIZE ? "#4a90e2" : "#fff";
          b.style.color = parseInt(b.getAttribute("data-size"))===GRID_SIZE ? "#fff" : "#333";
        });
      }
      newGame(detectedSeed);
    } else {
      newGame(val);
    }
  }
});

function saveGame() {
  if (!game || allFound) return;
  var save = {
    seed: currentSeed,
    foundWords: Object.keys(foundWords),
    foundCount: foundCount,
    usedCells: []
  };
  for (var r = 0; r < GRID_SIZE; r++)
    for (var c = 0; c < GRID_SIZE; c++)
      if (usedCells[r][c]) save.usedCells.push(r * 100 + c);

  var existing = localStorage.getItem(SAVE_KEY);
  if (existing) {
    try {
      var prev = JSON.parse(existing);
      if (prev && prev.foundWords && prev.foundWords.length > 0) {
        confirmOverwrite(
          "Partie déjà sauvegardée (" + prev.foundWords.length + " mots). Écraser ?",
          function() {
            localStorage.setItem(SAVE_KEY, JSON.stringify(save));
            var btn = document.getElementById("btn-save");
            btn.textContent = "✅ Sauvegardé";
            setTimeout(function(){ btn.textContent = "💾 Sauvegarder"; }, 1500);
          }
        );
        return;

    } catch(e) {}
  }

  localStorage.setItem(SAVE_KEY, JSON.stringify(save));
  var btn = document.getElementById("btn-save");
  btn.textContent = "✅ Sauvegardé";
  setTimeout(function(){ btn.textContent = "💾 Sauvegarder"; }, 1500);
}

    outer5: for (var r = 0; r < GRID_SIZE; r++) {
      for (var c = 0; c < GRID_SIZE; c++) {
        for (var di = 0; di < ALL_DIRS.length; di++) {
          var dir = ALL_DIRS[di], match = true;

            if (nr<0||nr>=GRID_SIZE||nc<0||nc>=GRID_SIZE||game.grid[nr][nc]!==w[k]){match=false;break;}
          }
          if (match) {
            var resumeCells = [];
            for (var k = 0; k < w.length; k++) {
              usedCells[r+dir.dr*k][c+dir.dc*k] = true;
              resumeCells.push({r:r+dir.dr*k, c:c+dir.dc*k});

            highlights.push({cells:resumeCells, color:resumeColor});
            break outer5;
          }
        }
      }
    }

function checkSave() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);

    var save = JSON.parse(raw);

  e.stopPropagation();
  gridMenu.style.display = gridMenu.style.display === "none" ? "block" : "none";
  document.querySelectorAll(".gsize-btn").forEach(function(b){
    b.style.background = parseInt(b.dataset.size) === GRID_SIZE ? "#4a90e2" : "#fff";
    b.style.color = parseInt(b.dataset.size) === GRID_SIZE ? "#fff" : "#333";
  });
});
document.querySelectorAll(".gsize-btn").forEach(function(btn){
  btn.addEventListener("click", function(){
    var newSize = parseInt(btn.dataset.size);
    if (newSize === GRID_SIZE) { gridMenu.style.display = "none"; return; }
    localStorage.setItem("mots-grid-size", newSize);
    GRID_SIZE = newSize;
    CELL = Math.floor((Math.min(window.innerWidth, 720) - 8) / GRID_SIZE);
    FONT_SIZE = GRID_SIZE <= 10 ? Math.round(CELL * 0.52) : GRID_SIZE <= 12 ? Math.round(CELL * 0.48) : Math.round(CELL * 0.65);
    gridMenu.style.display = "none";
    initCanvas();
    newGame();
  });
});
document.addEventListener("click", function(){
  gridMenu.style.display = "none";
});

initCanvas();
// Si sauvegarde trouvée on attend le choix du joueur, sinon on lance une nouvelle partie
if (!checkSave()) newGame();
</script>

<!-- PEERJS -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ══ MULTIJOUEUR ══════════════════════════════════════════════════════
var multiMode   = null;  // 'compet' ou 'coop'
var isHost      = false;
var peer        = null;
var conn        = null;
var multiActive = false;
var gameFinished= false;

var multiPanel  = document.getElementById("multi-panel");
var multiStatus = document.getElementById("multi-status");
var advScore    = document.getElementById("adv-score");
var advCountEl  = document.getElementById("adv-count");
var advTotalEl  = document.getElementById("adv-total");
var advBar      = document.getElementById("adv-bar");
var multiResult = document.getElementById("multi-result");
var roomDisplay = document.getElementById("room-display");
var roomCodeEl  = document.getElementById("room-code");
var joinZone    = document.getElementById("join-zone");
var modeZone    = document.getElementById("multi-mode-zone");
var btnQuit     = document.getElementById("btn-quit-multi");

function setStatus(msg) { multiStatus.textContent = msg; }

function showAdvScore(found, total) {
  advCountEl.textContent = found;
  advTotalEl.textContent = total;
  advBar.style.width = (total > 0 ? Math.round(found/total*100) : 0) + "%";
  advScore.classList.add("visible");
}

function resetMultiUI() {
  multiActive = false; gameFinished = false;
  advScore.classList.remove("visible");
  multiResult.classList.remove("visible");
  multiResult.textContent = "";
  setStatus("");
  roomDisplay.style.display = "none";
  joinZone.style.display = "none";
  btnQuit.style.display = "none";
}

function closePeer() {
  if (conn) { try { conn.close(); } catch(e){} conn = null; }
  if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
  resetMultiUI();
  multiMode = null; isHost = false;
}

document.getElementById("btn-mode-compet").addEventListener("click", function(){
  multiMode = "compet"; modeZone.style.display = "block";
  setStatus("Mode compétitif — Créer ou rejoindre ?");
});
document.getElementById("btn-mode-coop").addEventListener("click", function(){
  multiMode = "coop"; modeZone.style.display = "block";
  setStatus("Mode coopératif — Créer ou rejoindre ?");
});
document.getElementById("multi-btn").addEventListener("click", function(){
  multiPanel.classList.toggle("visible");
});
btnQuit.addEventListener("click", function(){
  closePeer();
  setStatus("Déconnecté.");
  modeZone.style.display = "none";
});
document.getElementById("btn-cancel-multi").addEventListener("click", function(){
  modeZone.style.display = "none";
  joinZone.style.display = "none";
  roomDisplay.style.display = "none";
  multiMode = null;
  setStatus("");
});

// ── HÔTE ──────────────────────────────────────────────────────────────
document.getElementById("btn-host").addEventListener("click", function(){
  if (peer) closePeer();
  isHost = true;
  setStatus("⏳ Création de la room...");
  var code = String(Math.floor(100000 + Math.random()*900000));
  peer = new Peer("motscaches-" + code);
  peer.on("open", function(){
    roomDisplay.style.display = "block";
    roomCodeEl.textContent = code;
    joinZone.style.display = "none";
    btnQuit.style.display = "inline-block";
    setStatus("✅ Room créée ! En attente d'un joueur...");
    if (typeof listenForCall === "function") listenForCall();
  });
  peer.on("connection", function(c){
    conn = c; setupConn();
    setStatus("⏳ Connexion en cours...");
    // Ne pas envoyer start ici — attendre le signal ready du joueur 2
  });
  peer.on("error", function(e){ setStatus("❌ Erreur: " + e.type); });
});

// ── REJOINDRE ─────────────────────────────────────────────────────────
document.getElementById("btn-join").addEventListener("click", function(){
  joinZone.style.display = "block";
  roomDisplay.style.display = "none";
  setStatus("Saisis le code de ton adversaire.");
});
document.getElementById("btn-connect").addEventListener("click", function(){
  var code = document.getElementById("room-input").value.trim();
  if (!code) return;
  if (peer) closePeer();
  isHost = false;
  peer = new Peer();
  peer.on("open", function(){
    setStatus("Connexion...");
    conn = peer.connect("motscaches-" + code);
    setupConn();
    btnQuit.style.display = "inline-block";
    if (typeof listenForCall === "function") listenForCall();
  });
  peer.on("error", function(e){ setStatus("Erreur: " + e.type); });
});

// ── CONNEXION DATA ─────────────────────────────────────────────────────
function setupConn() {
  conn.on("open", function(){
    if (!isHost) {
      setStatus("✅ Connecté ! En attente du début...");
      conn.send({ type: "ready" });
    } else {
      setStatus("✅ Joueur connecté ! Démarrage...");
    }
    // Sauvegarder l'ID du peer distant pour l'appel audio
    if (typeof remotePeerId !== "undefined") remotePeerId = conn.peer;
  });
  conn.on("data", function(data){
    if (!data || !data.type) return;

    // Hôte reçoit ready → envoie start
    if (data.type === "ready" && isHost) {
      conn.send({ type:"start", seed: currentSeed, mode: multiMode, total: game ? game.words.length : 0, gridSize: GRID_SIZE });
      multiActive = true; gameFinished = false;
      multiResult.classList.remove("visible");
      if (multiMode === "compet") { showAdvScore(0, game ? game.words.length : 0); setStatus("⚔️ Partie commencée — Bonne chance !"); }
      else { setStatus("🤝 Partie commencée — À vous deux !"); }
      if (typeof showVoiceZone === "function") showVoiceZone();
      return;
    }

    if (data.type === "start") {
      multiMode = data.mode; multiActive = true; gameFinished = false;
      multiResult.classList.remove("visible");
      // Appliquer la même taille de grille que l'hôte
      if (data.gridSize && data.gridSize !== GRID_SIZE) {
        GRID_SIZE = data.gridSize;
        CELL = Math.floor((Math.min(window.innerWidth, 720) - 8) / GRID_SIZE);
        FONT_SIZE = GRID_SIZE <= 10 ? Math.round(CELL * 0.52) : GRID_SIZE <= 12 ? Math.round(CELL * 0.48) : Math.round(CELL * 0.65);
        initCanvas();
      }
      allFound = false; foundWords = {}; foundCount = 0;
      usedCells = makeUsed(); selCells = []; dragging = false;
      document.getElementById("mystery-zone").classList.remove("visible");
      mInput.value = ""; mInput.disabled = false; mInput.className = "";
      mResult.textContent = ""; mResult.className = ""; mBtn.disabled = false;
      initSeed(data.seed);
      game = generateGame();
      document.getElementById("theme-label").textContent = "Theme : " + (game ? game.theme : "");
      document.getElementById("seed-display").textContent = "Code partie : " + GRID_SIZE + data.seed;
      renderWordList(game ? game.words : []);
      updateScore(); drawGrid();
      if (multiMode === "compet") { showAdvScore(0, game ? game.words.length : 0); setStatus("⚔️ En cours !"); }
      else { setStatus("🤝 En cours !"); }
      if (typeof showVoiceZone === "function") showVoiceZone();
    }

    else if (data.type === "progress" && multiMode === "compet") {
      showAdvScore(data.found, data.total);
      if (data.found === data.total && !gameFinished) {
        gameFinished = true;
        multiResult.textContent = "😢 L'adversaire a gagné !";
        multiResult.className = "lose";
        multiResult.classList.add("visible");
        multiPanel.classList.add("visible");
        blockGame();
      }
    }

    else if (data.type === "word" && multiMode === "coop") {
      var w = data.word;
      if (!game || foundWords[w]) return;
      foundWords[w] = true; foundCount++;
      outer4: for (var r2=0;r2<GRID_SIZE;r2++) {
        for (var c2=0;c2<GRID_SIZE;c2++) {
          for (var di2=0;di2<ALL_DIRS.length;di2++) {
            var dir2=ALL_DIRS[di2],ok=true;
            for (var k2=0;k2<w.length;k2++) {
              var nr2=r2+dir2.dr*k2,nc2=c2+dir2.dc*k2;
              if(nr2<0||nr2>=GRID_SIZE||nc2<0||nc2>=GRID_SIZE||game.grid[nr2][nc2]!==w[k2]){ok=false;break;}
            }
            if(ok){
              var coopCells=[];
              for(var k2=0;k2<w.length;k2++){usedCells[r2+dir2.dr*k2][c2+dir2.dc*k2]=true;coopCells.push({r:r2+dir2.dr*k2,c:c2+dir2.dc*k2});}
              var coopColor=HL_COLORS[colorIdx++%HL_COLORS.length];
              highlights.push({cells:coopCells,color:coopColor});
              markWordFound(w,coopColor);
              break outer4;
            }
          }
        }
      }
      updateScore(); drawGrid();
      if (foundCount === game.words.length) onAllFound();
    }

    else if (data.type === "win") {
      if (!gameFinished) {
        gameFinished = true;
        multiResult.textContent = "😢 L'adversaire a gagné !";
        multiResult.className = "lose";
        multiResult.classList.add("visible");
        multiPanel.classList.add("visible");
        blockGame();
      }
    }

    else if (data.type === "audio") {
      receiveAudio(data.data);
    }

    else if (data.type === "hangup") {
      hangup();
      setCallStatus("L'adversaire a raccroché.");
    }

    else if (data.type === "disconnect") {
      setStatus("L'adversaire s'est déconnecté."); multiActive = false;
    }
  });
  conn.on("close", function(){ setStatus("Connexion perdue."); multiActive = false; });
}

// ── NOTIFIER L'ADVERSAIRE ─────────────────────────────────────────────
function multiNotify(word) {
  if (!multiActive || !conn || !conn.open) return;
  if (multiMode === "compet")
    conn.send({ type:"progress", found: foundCount, total: game ? game.words.length : 0 });
  else if (multiMode === "coop")
    conn.send({ type:"word", word: word });
}
function multiNotifyWin() {
  if (!multiActive || !conn || !conn.open) return;
  conn.send({ type:"win" });
}

function blockGame() {
  // Bloquer la grille
  canvas.style.pointerEvents = "none";
  canvas.style.opacity = "0.5";
  // Bloquer le mot mystère
  mInput.disabled = true;
  mBtn.disabled = true;
}

function unblockGame() {
  canvas.style.pointerEvents = "";
  canvas.style.opacity = "";
  mInput.disabled = false;
  mBtn.disabled = false;
}
// ══ FIN MULTIJOUEUR ═══════════════════════════════════════════════════

// ══ MESSAGE VOCAL ══════════════════════════════════════════════════════
var mediaRecorder = null;
var audioChunks   = [];
var btnMic        = document.getElementById("btn-mic");
var voiceZone     = document.getElementById("voice-zone");
var voiceStatus   = document.getElementById("voice-status");
var audioPlayback = document.getElementById("audio-playback");
var MAX_DURATION  = 60000; // 60 secondes max
var recTimer      = null;

// Afficher la zone vocale quand la connexion est active
function showVoiceZone() {
  voiceZone.style.display = multiActive ? "block" : "none";
}

// Enregistrement : maintenir appuyé
btnMic.addEventListener("touchstart", function(e){
  e.preventDefault();
  startRecording();
}, {passive:false});
btnMic.addEventListener("touchend", function(e){
  e.preventDefault();
  stopRecording();
}, {passive:false});
// Support souris pour test desktop
btnMic.addEventListener("mousedown", startRecording);
btnMic.addEventListener("mouseup", stopRecording);

function startRecording() {
  if (!multiActive || !conn || !conn.open) {
    voiceStatus.textContent = "Pas connecté."; return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
    mediaRecorder.ondataavailable = function(e) {
      if (e.data.size > 0) audioChunks.push(e.data);
    };
    mediaRecorder.onstop = function() {
      stream.getTracks().forEach(function(t){ t.stop(); });
      var blob = new Blob(audioChunks, { type: "audio/webm" });
      sendAudio(blob);
    };
    mediaRecorder.start();
    btnMic.style.background = "#e74c3c";
    btnMic.textContent = "🔴 Enregistrement...";
    voiceStatus.textContent = "Parle maintenant, relâche pour envoyer";
    // Arrêt automatique après MAX_DURATION
    recTimer = setTimeout(stopRecording, MAX_DURATION);
  }).catch(function(){
    voiceStatus.textContent = "Micro non autorisé.";
  });
}

function stopRecording() {
  if (recTimer) { clearTimeout(recTimer); recTimer = null; }
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
    btnMic.style.background = "#e67e22";
    btnMic.textContent = "🎙️ Maintenir pour parler";
    voiceStatus.textContent = "Envoi...";
  }
}

function sendAudio(blob) {
  var reader = new FileReader();
  reader.onload = function() {
    if (conn && conn.open) {
      conn.send({ type: "audio", data: reader.result });
      voiceStatus.textContent = "Message envoyé ✓";
      setTimeout(function(){ voiceStatus.textContent = ""; }, 2000);
    }
  };
  reader.readAsDataURL(blob);
}

function receiveAudio(dataUrl) {
  audioPlayback.src = dataUrl;
  audioPlayback.style.display = "block";
  voiceStatus.textContent = "🔊 Message vocal reçu — appuie pour écouter";
  // Pas de lecture automatique — l'adversaire écoute quand il veut
  audioPlayback.onplay = function() {
    voiceStatus.textContent = "";
  };
}
// ══ FIN MESSAGE VOCAL ══════════════════════════════════════════════════

// ══ APPEL AUDIO TEMPS RÉEL ═════════════════════════════════════════════
var currentCall   = null;
var localStream   = null;
var remotePeerId  = null; // ID PeerJS de l'adversaire
var btnCall       = document.getElementById("btn-call");
var btnHangup     = document.getElementById("btn-hangup");
var callStatus    = document.getElementById("call-status");
var remoteAudio   = document.getElementById("remote-audio");
var ringInterval  = null;

function playRing() {
  if (!soundOn) return;
  var i = 0;
  ringInterval = setInterval(function() {
    try {
      var ctx2 = new (window.AudioContext||window.webkitAudioContext)();
      var osc = ctx2.createOscillator();
      var gain = ctx2.createGain();
      osc.connect(gain); gain.connect(ctx2.destination);
      osc.type = "sine"; osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx2.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime+0.25);
      osc.start(); osc.stop(ctx2.currentTime+0.25);
      setTimeout(function(){
        try {
          var ctx3=new (window.AudioContext||window.webkitAudioContext)();
          var o2=ctx3.createOscillator(),g2=ctx3.createGain();
          o2.connect(g2);g2.connect(ctx3.destination);
          o2.type="sine";o2.frequency.value=660;
          g2.gain.setValueAtTime(0.3,ctx3.currentTime);
          g2.gain.exponentialRampToValueAtTime(0.001,ctx3.currentTime+0.25);
          o2.start();o2.stop(ctx3.currentTime+0.25);
        }catch(e){}
      }, 280);
    } catch(e){}
    i++;
    if (i >= 4) stopRing();
  }, 700);
}
function stopRing() {
  if (ringInterval) { clearInterval(ringInterval); ringInterval = null; }
}
function setCallStatus(msg) { callStatus.textContent = msg; }
function attachRemoteStream(stream) {
  remoteAudio.srcObject = stream;
}
function onCallEstablished() {
  stopRing();
  btnCall.style.display = "none";
  btnHangup.style.display = "inline-block";
  setCallStatus("📞 En ligne...");
}
function hangup() {
  stopRing();
  if (currentCall) { try { currentCall.close(); } catch(e){} currentCall = null; }
  if (localStream) { localStream.getTracks().forEach(function(t){ t.stop(); }); localStream = null; }
  remoteAudio.srcObject = null;
  btnCall.style.display = "inline-block";
  btnHangup.style.display = "none";
  setCallStatus("");
  if (conn && conn.open) conn.send({ type: "hangup" });
}

btnCall.addEventListener("click", function() {
  if (!multiActive || !conn || !conn.open) { setCallStatus("Pas connecté."); return; }
  if (!remotePeerId) { setCallStatus("ID adversaire inconnu."); return; }
  navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function(stream) {
    localStream = stream;
    var call = peer.call(remotePeerId, stream);
    currentCall = call;
    setCallStatus("⏳ Appel en cours...");
    playRing();
    call.on("stream", function(remoteStream) {
      attachRemoteStream(remoteStream);
      onCallEstablished();
    });
    call.on("close", function() { hangup(); });
    call.on("error", function(e) { hangup(); setCallStatus("❌ Erreur: "+e); });
  }).catch(function(e) { setCallStatus("❌ Micro refusé."); });
});

btnHangup.addEventListener("click", hangup);

function listenForCall() {
  if (!peer) return;
  peer.on("call", function(call) {
    stopRing();
    playRing();
    remotePeerId = call.peer;
    setCallStatus("📲 Appel entrant...");
    btnCall.style.display = "none";
    btnHangup.style.display = "none";
    // Afficher bouton décrocher
    var btnAnswer = document.getElementById("btn-answer");
    if (!btnAnswer) {
      btnAnswer = document.createElement("button");
      btnAnswer.id = "btn-answer";
      btnAnswer.style.cssText = "padding:8px 16px;border-radius:20px;border:none;background:#27ae60;color:#fff;font-size:1.2rem;cursor:pointer;margin-right:6px;";
      btnAnswer.textContent = "✅ Décrocher";
      btnHangup.parentNode.insertBefore(btnAnswer, btnHangup);
    }
    btnAnswer.style.display = "inline-block";
    btnAnswer.onclick = function() {
      btnAnswer.style.display = "none";
      stopRing();
      navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function(stream) {
        localStream = stream;
        call.answer(stream);
        currentCall = call;
        call.on("stream", function(remoteStream) {
          attachRemoteStream(remoteStream);
          onCallEstablished();
        });
        call.on("close", function() {
          hangup();
          btnAnswer.style.display = "none";
        });
      }).catch(function() { setCallStatus("❌ Micro refusé."); });
    };
    // Bouton refuser
    var btnReject = document.getElementById("btn-reject");
    if (!btnReject) {
      btnReject = document.createElement("button");
      btnReject.id = "btn-reject";
      btnReject.style.cssText = "padding:8px 16px;border-radius:20px;border:none;background:#e74c3c;color:#fff;font-size:1.2rem;cursor:pointer;";
      btnReject.textContent = "❌ Refuser";
      btnHangup.parentNode.insertBefore(btnReject, btnHangup);
    }
    btnReject.style.display = "inline-block";
    btnReject.onclick = function() {
      stopRing();
      btnAnswer.style.display = "none";
      btnReject.style.display = "none";
      btnCall.style.display = "inline-block";
      setCallStatus("");
      if (conn && conn.open) conn.send({ type: "hangup" });
    };
  });
}
// ══ FIN APPEL AUDIO ════════════════════════════════════════════════════
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
  if (window.caches) {
    caches.keys().then(function(keys) {
      var k = keys.find(function(k){ return k.indexOf('mots-cache') === 0; });
      if (k) {
        var v = k.replace('mots-cache-multi-x-','').replace('mots-cache-','');
        var el = document.getElementById('version');
        if (el) el.textContent = v;
      }
    });
  }
</script>
