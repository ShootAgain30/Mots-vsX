<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mots cachés</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      padding: 12px 16px;
      text-align: center;
    }
    h1 { margin: 0; font-size: 1.4rem; }
    #game {
      width: 100%;
      max-width: 480px;
      padding: 8px 16px 24px;
      box-sizing: border-box;
    }
    #grid {
      display: grid;
      gap: 2px;
      margin: 12px auto;
      touch-action: none;
    }
    .cell {
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 4px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      user-select: none;
      cursor: default;
    }
    .cell.selected {
      background: #cde4ff;
      border-color: #4a90e2;
    }
    .cell.found {
      background: #b5f5b5;
      border-color: #3c9c3c;
      color: #104010;
    }
    #word-list {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 13px;
    }
    .word-item {
      padding: 3px 7px;
      border-radius: 4px;
      background: #fff;
      border: 1px solid #ccc;
    }
    .word-item.found {
      text-decoration: line-through;
      background: #b5f5b5;
      border-color: #3c9c3c;
      color: #104010;
    }
    #hidden-word {
      margin-top: 14px;
      font-weight: 700;
      text-align: center;
      min-height: 1.4em;
      font-size: 1rem;
      color: #c00;
    }
    #score {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin-top: 4px;
    }
    #controls {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    button {
      padding: 7px 14px;
      border-radius: 4px;
      border: 1px solid #4a90e2;
      background: #4a90e2;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <header><h1>🔍 Mots cachés</h1></header>

  <main id="game">
    <div id="grid"></div>
    <div id="score"></div>
    <div id="word-list"></div>
    <div id="hidden-word"></div>
    <div id="controls">
      <button id="new-game">Nouvelle grille</button>
    </div>
  </main>

  <script>
    // ─── Configuration ───────────────────────────────────────────────
    const GRID_SIZE = 12;
    const WORDS_TO_PLACE = 8;

    // ─── Banque de mots par thème ────────────────────────────────────
    const WORDS_VISIBLE = {
      animaux: [
        "CHAT","LION","TIGRE","OURS","RENARD","LOUP","AIGLE","REQUIN",
        "DAUPHIN","VACHE","CHEVAL","COCHON","LAPIN","SERPENT","SINGE",
        "GIRAFE","ELEPHANT","PERROQUET","MOUTON","HIBOU"
      ],
      fruits: [
        "POMME","BANANE","KIWI","RAISIN","MANGUE","FRAISE","CERISE",
        "ANANAS","PECHE","POIRE","CITRON","ORANGE","PRUNE","MELON",
        "FRAMBOISE","ABRICOT","FIGUE","PAPAYE","GOYAVE","COCO"
      ],
      sports: [
        "FOOT","RUGBY","TENNIS","NATATION","CYCLISME","BOXE","GOLF",
        "BASKET","VOLLEY","HANDBALL","JUDO","KARATE","ESCRIME",
        "AVIRON","SURF","SKI","PATINAGE","LUTTE","PLONGEON","TRIATHLON"
      ],
      pays: [
        "FRANCE","ESPAGNE","ITALIE","JAPON","CHINE","BRESIL","CANADA",
        "MEXIQUE","INDE","RUSSIE","TURQUIE","EGYPTE","MAROC","ALGERIE",
        "GHANA","IRAN","PEROU","CUBA","CHILI","SUEDE"
      ],
      couleurs: [
        "ROUGE","BLEU","VERT","JAUNE","ORANGE","VIOLET","ROSE","GRIS",
        "BLANC","NOIR","BEIGE","CYAN","INDIGO","MARRON","CORAIL",
        "AZUR","OCRE","LILAS","TURQUOISE","ECARLATE"
      ],
      metiers: [
        "MEDECIN","PILOTE","POMPIER","CUISINIER","AVOCAT","JUGE",
        "ACTEUR","DANSEUR","CHANTEUR","PEINTRE","SCULPTEUR","INGENIEUR",
        "ARCHITECTE","INFIRMIER","PHARMACIEN","LIBRAIRE","MENUISIER",
        "PLOMBIER","COIFFEUR","JARDINIER"
      ],
      nature: [
        "FORET","OCEAN","RIVIERE","MONTAGNE","DESERT","PRAIRIE","VOLCAN",
        "GLACIER","FALAISE","LAGUNE","CANYON","DELTA","TOUNDRA",
        "SAVANE","MARAIS","COLLINE","VALLEE","PLATEAU","DUNE","GROTTE"
      ],
      corps: [
        "BRAS","JAMBE","TETE","COEUR","FOIE","REIN","POUMON","GENOU",
        "COUDE","EPAULE","CHEVILLE","POIGNET","NUQUE","MENTON","TEMPE",
        "NARINE","PAUME","TALON","STERNUM","CLAVICULE"
      ],
    };

    const WORDS_HIDDEN = {
      8:  ["MYSTERE","VICTOIRE","ENIGME","TRESOR"],
      10: ["AVENTURES","DECOUVERTE","CHAMPIONS"],
      12: ["RECOMPENSES","FELICITATION","MERVEILLEUX"],
      14: ["EXTRAORDINAIRE","CONGRATULATION"],
      16: ["FELICITATIONSJEU","SUPERCHAMPIONS"],
    };

    const DIRECTIONS = [
      { dr: 0,  dc: 1  },
      { dr: 0,  dc: -1 },
      { dr: 1,  dc: 0  },
      { dr: -1, dc: 0  },
      { dr: 1,  dc: 1  },
      { dr: 1,  dc: -1 },
      { dr: -1, dc: 1  },
      { dr: -1, dc: -1 },
    ];

    // ─── Utilitaires ─────────────────────────────────────────────────
    const randInt = max => Math.floor(Math.random() * max);
    const choice  = arr => arr[randInt(arr.length)];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = randInt(i + 1);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ─── Génération de grille ─────────────────────────────────────────
    function createEmptyGrid(size) {
      return Array.from({ length: size }, () => Array(size).fill(null));
    }
    function createUsedGrid(size) {
      return Array.from({ length: size }, () => Array(size).fill(false));
    }

    function canPlaceWord(grid, word, row, col, dir) {
      const n = grid.length;
      for (let i = 0; i < word.length; i++) {
        const r = row + dir.dr * i;
        const c = col + dir.dc * i;
        if (r < 0 || r >= n || c < 0 || c >= n) return false;
        const ch = grid[r][c];
        if (ch !== null && ch !== word[i]) return false;
      }
      return true;
    }

    function placeWord(grid, used, word) {
      const n = grid.length;
      const dirs = shuffle(DIRECTIONS);
      for (let attempt = 0; attempt < 300; attempt++) {
        const dir = dirs[attempt % dirs.length];
        const row = randInt(n);
        const col = randInt(n);
        if (!canPlaceWord(grid, word, row, col, dir)) continue;
        for (let i = 0; i < word.length; i++) {
          const r = row + dir.dr * i;
          const c = col + dir.dc * i;
          grid[r][c] = word[i];
          used[r][c] = true;
        }
        return true;
      }
      return false;
    }

    function getUnusedCells(used) {
      const cells = [];
      const n = used.length;
      for (let r = 0; r < n; r++)
        for (let c = 0; c < n; c++)
          if (!used[r][c]) cells.push([r, c]);
      return cells;
    }

    function selectHiddenWord(freeCount) {
      const keys = Object.keys(WORDS_HIDDEN).map(Number).sort((a, b) => a - b);
      let best = null;
      for (const k of keys) if (k <= freeCount) best = k;
      if (best === null) return null;
      return { word: choice(WORDS_HIDDEN[best]), length: best };
    }

    function fillHiddenWord(grid, used) {
      const unused = getUnusedCells(used);
      const result = selectHiddenWord(unused.length);
      if (!result) return null;
      const { word } = result;
      for (let i = 0; i < word.length; i++) {
        const [r, c] = unused[i];
        grid[r][c] = word[i];
      }
      return word;
    }

    function generateGame(depth = 0) {
      if (depth > 100) { console.error("Génération échouée"); return null; }

      const grid = createEmptyGrid(GRID_SIZE);
      const used = createUsedGrid(GRID_SIZE);

      const theme = choice(Object.keys(WORDS_VISIBLE));
      const pool  = shuffle(WORDS_VISIBLE[theme]).filter(w => w.length <= GRID_SIZE);
      const words = [];

      for (const w of pool) {
        if (words.length >= WORDS_TO_PLACE) break;
        if (placeWord(grid, used, w)) words.push(w);
      }

      if (words.length < 4) return generateGame(depth + 1);

      const hidden = fillHiddenWord(grid, used);
      if (!hidden) return generateGame(depth + 1);

      const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      for (let r = 0; r < GRID_SIZE; r++)
        for (let c = 0; c < GRID_SIZE; c++)
          if (grid[r][c] === null)
            grid[r][c] = alpha[randInt(alpha.length)];

      return { grid, words, hiddenWord: hidden, theme };
    }

    // ─── État UI ──────────────────────────────────────────────────────
    const gridEl       = document.getElementById("grid");
    const wordListEl   = document.getElementById("word-list");
    const hiddenWordEl = document.getElementById("hidden-word");
    const scoreEl      = document.getElementById("score");
    const newGameBtn   = document.getElementById("new-game");

    let currentGame   = null;
    let selectedCells = [];
    let isDragging    = false;
    let foundWords    = new Set();

    // ─── Rendu ────────────────────────────────────────────────────────
    function renderGrid(grid) {
      const n = grid.length;
      gridEl.innerHTML = "";
      gridEl.style.gridTemplateColumns = `repeat(${n}, 28px)`;
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          const div = document.createElement("div");
          div.className = "cell";
          div.textContent = grid[r][c];
          div.dataset.row = r;
          div.dataset.col = c;
          gridEl.appendChild(div);
        }
      }
    }

    function renderWordList(words) {
      wordListEl.innerHTML = "";
      words.forEach(w => {
        const span = document.createElement("span");
        span.className = "word-item";
        span.textContent = w;
        span.dataset.word = w;
        wordListEl.appendChild(span);
      });
    }

    function updateScore() {
      scoreEl.textContent = `${foundWords.size} / ${currentGame.words.length} mots trouvés`;
    }

    // ─── Sélection ────────────────────────────────────────────────────
    function clearSelection() {
      selectedCells.forEach(cell => cell.classList.remove("selected"));
      selectedCells = [];
    }

    // Récupère la cellule sous les coordonnées écran — fonctionne sur mobile
    function cellFromPoint(x, y) {
      const el = document.elementFromPoint(x, y);
      return el ? el.closest(".cell") : null;
    }

    // Vérifie que la sélection forme une ligne droite cohérente
    function isValidLine(cells) {
      if (cells.length <= 1) return true;
      const r0 = +cells[0].dataset.row, c0 = +cells[0].dataset.col;
      const r1 = +cells[1].dataset.row, c1 = +cells[1].dataset.col;
      const dr = Math.sign(r1 - r0), dc = Math.sign(c1 - c0);
      if (dr === 0 && dc === 0) return false;
      for (let i = 1; i < cells.length; i++) {
        const r = +cells[i].dataset.row, c = +cells[i].dataset.col;
        if (r !== r0 + dr * i || c !== c0 + dc * i) return false;
      }
      return true;
    }

    function getWordFromSelection() {
      return selectedCells.map(c => c.textContent).join("");
    }

    function markWordFound(word) {
      wordListEl.querySelectorAll(".word-item").forEach(el => {
        if (el.dataset.word === word) el.classList.add("found");
      });
    }

    function allWordsFound() {
      return foundWords.size === currentGame.words.length;
    }

    // ─── Événements drag ─────────────────────────────────────────────
    function onStart(x, y) {
      const cell = cellFromPoint(x, y);
      if (!cell) return;
      isDragging = true;
      clearSelection();
      cell.classList.add("selected");
      selectedCells.push(cell);
    }

    function onMove(x, y) {
      if (!isDragging) return;
      const cell = cellFromPoint(x, y);
      if (!cell || selectedCells.includes(cell)) return;
      const test = [...selectedCells, cell];
      if (!isValidLine(test)) return;
      cell.classList.add("selected");
      selectedCells.push(cell);
    }

    function onEnd() {
      if (!isDragging) return;
      isDragging = false;

      const word    = getWordFromSelection();
      const wordRev = word.split("").reverse().join("");
      const match   = currentGame.words.find(w => w === word || w === wordRev);

      if (match && !foundWords.has(match)) {
        foundWords.add(match);
        selectedCells.forEach(c => c.classList.add("found"));
        markWordFound(match);
        updateScore();
        if (allWordsFound()) {
          setTimeout(() => {
            hiddenWordEl.textContent = "🎉 Mot caché : " + currentGame.hiddenWord;
          }, 200);
        }
      }
      clearSelection();
    }

    function setupGridEvents() {
      // Touch (mobile) — passive:false pour pouvoir faire preventDefault
      gridEl.addEventListener("touchstart", e => {
        e.preventDefault();
        const t = e.touches[0];
        onStart(t.clientX, t.clientY);
      }, { passive: false });

      gridEl.addEventListener("touchmove", e => {
        e.preventDefault();
        const t = e.touches[0];
        onMove(t.clientX, t.clientY);
      }, { passive: false });

      gridEl.addEventListener("touchend", e => {
        e.preventDefault();
        onEnd();
      }, { passive: false });

      // Pointer (desktop / stylet)
      gridEl.addEventListener("pointerdown", e => {
        if (e.pointerType === "touch") return; // déjà géré par touch events
        onStart(e.clientX, e.clientY);
      });
      gridEl.addEventListener("pointermove", e => {
        if (e.pointerType === "touch") return;
        onMove(e.clientX, e.clientY);
      });
      window.addEventListener("pointerup", e => {
        if (e.pointerType === "touch") return;
        onEnd();
      });
    }

    // ─── Nouvelle partie ─────────────────────────────────────────────
    function newGame() {
      hiddenWordEl.textContent = "";
      foundWords = new Set();
      currentGame = generateGame();
      if (!currentGame) return;
      renderGrid(currentGame.grid);
      renderWordList(currentGame.words);
      updateScore();
    }

    newGameBtn.addEventListener("click", newGame);
    setupGridEvents();
    newGame();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
